[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# v5 escrow: fundWithAuthorization carries 9 params + EIP-3009 sig split; needs the IR pipeline
# to avoid "stack too deep". via_ir also yields tighter optimized bytecode.
via_ir = true

[rpc_endpoints]
arc = "${ARC_RPC_URL}"
