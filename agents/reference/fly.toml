app = "verdikt-reference-sellers"
primary_region = "iad"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[checks.health]
  type = "http"
  port = 8080
  method = "get"
  path = "/health"
  interval = "30s"
  timeout = "5s"
  grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
