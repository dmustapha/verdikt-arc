app = "verdikt-a2a-research"
primary_region = "iad"

[build]

# Single-origin A2A seller (the agent card lives at the origin root). Same image as the webhook service;
# SERVER_MODE=a2a selects the A2A surface for one skill.
[env]
  PORT = "8080"
  SERVER_MODE = "a2a"
  A2A_SKILL = "research"
  A2A_PUBLIC_URL = "https://verdikt-a2a-research.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[checks.health]
  type = "http"
  port = 8080
  method = "get"
  path = "/health"
  interval = "30s"
  timeout = "5s"
  grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
